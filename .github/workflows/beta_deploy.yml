name: Beta deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy beta"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install
      - name: Create .env file
        run: |
          echo "VITE_THIRDWEB_CLIENT_ID=${{ secrets.THIRDWEB_CLIENT_ID }}" >> .env
          # Beta UI points its inference API (auth / payments / credits) at the beta backend for the
          # subscriptions preview. The connected chat endpoint stays the normal gateway.
          echo "VITE_LTAI_INFERENCE_API_URL=https://beta.inference.api.libertai.io" >> .env
          echo "VITE_SOLANA_RPC=${{ secrets.SOLANA_RPC }}" >> .env
          echo "VITE_LTAI_CONNECTED_API_URL=${{ secrets.LTAI_CONNECTED_API_URL }}" >> .env
      - name: Build project
        run: pnpm run build

      - name: Deploy with Aleph
        uses: aleph-im/web3-hosting-action@v1.1.5
        with:
          path: 'dist'
          private-key: ${{ secrets.ALEPH_CLOUD_LTAI_CHAT_BETA }}
          domain: beta.chat.libertai.io
          retention_days: 1
